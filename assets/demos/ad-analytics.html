<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ad Analytics — Demo</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue:       #0574dd;
      --blue-dark:  #0461bd;
      --blue-deep:  #03408a;
      --blue-light: #e8f2ff;
      --blue-glow:  rgba(5,116,221,.14);
      --bg:         #f0f4fb;
      --card:       #ffffff;
      --text:       #0d1421;
      --muted:      #5a6778;
      --border:     #dde4ee;
      --r-sm:  10px;
      --r-md:  18px;
      --r-lg:  24px;
      --r-xl:  32px;
      --r-full: 100px;
      --shadow:    0 2px 16px rgba(5,116,221,.09);
      --shadow-md: 0 6px 28px rgba(5,116,221,.14);
      --shadow-lg: 0 12px 48px rgba(5,116,221,.20);
      --ease: .22s cubic-bezier(.4,0,.2,1);
    }

    body {
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before, body::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      z-index: 0;
    }
    body::before {
      width: 700px; height: 700px;
      background: radial-gradient(circle, rgba(5,116,221,.07) 0%, transparent 68%);
      top: -280px; right: -180px;
    }
    body::after {
      width: 550px; height: 550px;
      background: radial-gradient(circle, rgba(5,116,221,.05) 0%, transparent 68%);
      bottom: -220px; left: -140px;
    }

    /* ── Demo Banner ── */
    .demo-banner {
      background: linear-gradient(90deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      color: #fff;
      padding: 8px 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      font-size: .78rem;
      font-weight: 600;
      letter-spacing: .3px;
      position: relative;
      z-index: 20;
    }
    .demo-banner-badge {
      background: #f59e0b;
      color: #1a1a2e;
      border-radius: 4px;
      padding: 2px 8px;
      font-size: .7rem;
      font-weight: 800;
      letter-spacing: .5px;
    }
    .demo-banner-text { opacity: .85; }
    .demo-banner-close {
      position: absolute;
      right: 16px;
      background: none;
      border: none;
      color: rgba(255,255,255,.6);
      cursor: pointer;
      font-size: 1rem;
      line-height: 1;
      padding: 2px 6px;
      transition: color .2s;
    }
    .demo-banner-close:hover { color: #fff; }

    /* ── Header ── */
    header {
      background: linear-gradient(120deg, #0350a0 0%, var(--blue) 55%, #2a96ff 100%);
      color: #fff;
      padding: 0 40px;
      height: 66px;
      display: flex;
      align-items: center;
      gap: 14px;
      position: relative;
      z-index: 10;
      box-shadow: 0 3px 24px rgba(5,116,221,.35);
    }
    header::before {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(-45deg, transparent, transparent 28px, rgba(255,255,255,.025) 28px, rgba(255,255,255,.025) 30px);
      pointer-events: none;
    }
    .header-icon {
      width: 38px; height: 38px;
      background: rgba(255,255,255,.18);
      border-radius: var(--r-sm);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .header-text { display: flex; flex-direction: column; gap: 2px; }
    header h1 { font-size: 1.1rem; font-weight: 700; letter-spacing: .2px; }
    .header-sub { font-size: .72rem; opacity: .65; font-weight: 500; letter-spacing: .3px; text-transform: uppercase; }
    .header-badge {
      margin-left: auto;
      background: rgba(255,255,255,.15);
      border: 1px solid rgba(255,255,255,.25);
      border-radius: var(--r-full);
      padding: 4px 14px;
      font-size: .74rem;
      font-weight: 600;
      letter-spacing: .3px;
      opacity: .9;
    }

    /* ── Layout ── */
    main { max-width: 1240px; margin: 32px auto; padding: 0 24px; position: relative; z-index: 1; }

    .card {
      background: var(--card);
      border-radius: var(--r-xl);
      box-shadow: var(--shadow);
      padding: 28px 32px;
      margin-bottom: 22px;
      border: 1px solid rgba(5,116,221,.07);
      position: relative;
    }

    .card-title {
      font-size: .72rem;
      font-weight: 700;
      color: var(--blue);
      text-transform: uppercase;
      letter-spacing: .7px;
      margin-bottom: 18px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .card-title::before {
      content: '';
      display: block;
      width: 14px; height: 3px;
      background: var(--blue);
      border-radius: 2px;
    }

    /* ── Filtros ── */
    .filters { display: flex; flex-wrap: wrap; gap: 16px; align-items: flex-end; }
    .filter-group { display: flex; flex-direction: column; gap: 6px; }
    .filter-group label {
      font-size: .71rem;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .6px;
    }
    .filter-group select,
    .filter-group input[type="date"] {
      border: 1.5px solid var(--border);
      border-radius: var(--r-sm);
      padding: 9px 14px;
      font-size: .92rem;
      color: var(--text);
      background: #fff;
      outline: none;
      transition: border-color var(--ease), box-shadow var(--ease);
      min-width: 200px;
    }
    .filter-group select:focus,
    .filter-group input[type="date"]:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px var(--blue-glow);
    }

    /* ── Botões ── */
    .btn {
      padding: 10px 26px;
      border: none;
      border-radius: var(--r-full);
      font-size: .9rem;
      font-weight: 700;
      cursor: pointer;
      transition: background var(--ease), transform var(--ease), box-shadow var(--ease), opacity var(--ease);
      letter-spacing: .15px;
    }
    .btn-primary {
      background: var(--blue);
      color: #fff;
      box-shadow: 0 4px 16px rgba(5,116,221,.38);
    }
    .btn-primary:hover {
      background: var(--blue-dark);
      transform: translateY(-1.5px);
      box-shadow: 0 6px 22px rgba(5,116,221,.48);
    }
    .btn-success {
      background: #fff;
      color: var(--blue);
      border: 1.5px solid rgba(5,116,221,.4);
    }
    .btn-success:hover {
      background: var(--blue-light);
      border-color: var(--blue);
      transform: translateY(-1.5px);
    }
    .btn:disabled { opacity: .5; cursor: not-allowed; transform: none !important; box-shadow: none !important; }

    .actions { display: flex; gap: 10px; align-items: center; margin-top: 4px; }

    #status { font-size: .85rem; color: var(--muted); min-height: 20px; }
    #status.error { color: #d63b3b; }

    .spinner {
      display: none;
      width: 18px; height: 18px;
      border: 2.5px solid var(--border);
      border-top-color: var(--blue);
      border-radius: 50%;
      animation: spin .7s linear infinite;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Presets ── */
    .presets { display: flex; flex-wrap: wrap; gap: 7px; margin-top: 18px; }
    .preset-btn {
      border: 1.5px solid var(--border);
      background: #fff;
      color: var(--muted);
      border-radius: var(--r-full);
      padding: 5px 15px;
      font-size: .79rem;
      font-weight: 600;
      cursor: pointer;
      transition: background var(--ease), color var(--ease), border-color var(--ease), transform var(--ease);
    }
    .preset-btn:hover {
      background: var(--blue-light);
      border-color: var(--blue);
      color: var(--blue);
      transform: translateY(-1px);
    }
    .preset-btn.active { background: var(--blue); color: #fff; border-color: var(--blue); }

    /* ── Tabela ── */
    #results-section { display: none; }

    .view-toggle {
      display: flex;
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: var(--r-full);
      padding: 3px;
      gap: 2px;
    }
    .toggle-btn {
      border: none;
      background: transparent;
      color: var(--muted);
      padding: 6px 20px;
      font-size: .82rem;
      font-weight: 700;
      cursor: pointer;
      border-radius: var(--r-full);
      transition: background var(--ease), color var(--ease);
    }
    .toggle-btn.active { background: var(--blue); color: #fff; box-shadow: 0 2px 8px rgba(5,116,221,.3); }
    .toggle-btn:not(.active):hover { background: var(--blue-light); color: var(--blue); }

    .summary-bar { display: flex; gap: 20px; flex-wrap: wrap; margin-bottom: 16px; }
    .summary-item { font-size: .83rem; color: var(--muted); }
    .summary-item strong { color: var(--blue-deep); font-weight: 700; }

    .table-wrapper {
      overflow-x: auto;
      overflow-y: auto;
      max-height: calc(100vh - 310px);
      border-radius: var(--r-md);
      border: 1px solid var(--border);
    }

    table { width: 100%; border-collapse: collapse; font-size: .89rem; }
    thead th {
      background: var(--blue);
      color: #fff;
      padding: 12px 16px;
      text-align: center;
      font-weight: 700;
      white-space: nowrap;
      position: sticky;
      top: 0;
      z-index: 3;
      cursor: pointer;
      user-select: none;
      font-size: .75rem;
      letter-spacing: .35px;
      text-transform: uppercase;
    }
    thead th:first-child { text-align: left; }
    thead th:hover { background: var(--blue-dark); }
    .sort-icon { margin-left: 5px; opacity: .5; font-size: .82em; }
    thead th.sort-active { background: var(--blue-deep); }
    thead th.sort-active .sort-icon { opacity: 1; }

    tbody tr { transition: background var(--ease); }
    tbody tr:nth-child(even) { background: #f5f8ff; }
    tbody tr:hover { background: var(--blue-light); }

    tbody td {
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }
    tbody td:first-child {
      white-space: normal;
      max-width: 340px;
      overflow-wrap: break-word;
      word-break: break-word;
      color: var(--text);
      font-weight: 500;
    }
    tbody td:not(:first-child) { text-align: center; color: var(--muted); min-width: 90px; }

    .row-total td,
    tfoot td {
      background: linear-gradient(90deg, #ddeeff, #e8f2ff);
      font-weight: 700;
      color: var(--blue-deep);
      border-top: 2px solid rgba(5,116,221,.2);
      white-space: nowrap;
      padding: 10px 16px;
    }
    tfoot td {
      position: sticky;
      bottom: 0;
      z-index: 2;
    }
    tfoot td:not(:first-child) { text-align: center; }

    .na { color: #b8c4d0; font-style: italic; }

    .ad-link { color: inherit; text-decoration: none; cursor: pointer; }
    .ad-link:hover { color: var(--blue); text-decoration: underline; }

    /* ── Busca ── */
    .search-box {
      position: relative;
      display: inline-flex;
      align-items: center;
    }
    .search-box svg {
      position: absolute;
      left: 12px;
      color: #b0bac8;
      pointer-events: none;
    }
    .search-box input {
      border: 1.5px solid var(--border);
      border-radius: var(--r-full);
      padding: 8px 34px 8px 36px;
      font-size: .87rem;
      color: var(--text);
      background: #fff;
      outline: none;
      transition: border-color var(--ease), box-shadow var(--ease);
      width: 280px;
    }
    .search-box input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px var(--blue-glow);
    }
    .search-box input::placeholder { color: #b8c4d0; }
    .search-clear {
      position: absolute; right: 10px;
      background: none; border: none;
      cursor: pointer; color: #b0bac8;
      font-size: .95rem; line-height: 1; padding: 0;
      display: none;
      transition: color var(--ease);
    }
    .search-clear:hover { color: var(--muted); }
    .search-clear.visible { display: block; }

    /* ── Modais ── */
    .modal-backdrop {
      display: none;
      position: fixed; inset: 0;
      background: rgba(5,20,55,.5);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }
    .modal-backdrop.open { display: flex; }
    .modal-box {
      background: #fff;
      border-radius: var(--r-xl);
      box-shadow: var(--shadow-lg);
      padding: 28px 32px;
      max-width: 860px;
      width: calc(100% - 32px);
      max-height: 90vh;
      overflow-y: auto;
      position: relative;
      border: 1px solid rgba(5,116,221,.09);
    }
    .modal-close {
      position: absolute; top: 16px; right: 16px;
      width: 32px; height: 32px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem;
      background: var(--bg); border: 1px solid var(--border); border-radius: 50%;
      cursor: pointer; color: var(--muted);
      transition: background var(--ease), color var(--ease), border-color var(--ease);
    }
    .modal-close:hover { background: #fee2e2; color: #d63b3b; border-color: #fca5a5; }
    .modal-title {
      font-size: .98rem; font-weight: 700; color: var(--blue-deep);
      margin-bottom: 20px; padding-right: 40px; line-height: 1.35;
    }

    /* ── Drill-down ── */
    .drill-modal-box { max-width: 1000px; }
    .drill-adset {
      margin-bottom: 10px;
      border: 1px solid var(--border);
      border-radius: var(--r-md);
      overflow: hidden;
      box-shadow: 0 2px 10px rgba(5,116,221,.06);
      transition: box-shadow var(--ease);
    }
    .drill-adset:hover { box-shadow: 0 4px 18px rgba(5,116,221,.11); }
    .drill-adset-header {
      background: linear-gradient(120deg, #0350a0 0%, var(--blue) 100%);
      color: #fff;
      padding: 12px 18px;
      display: flex;
      align-items: center;
      gap: 18px;
      flex-wrap: wrap;
      cursor: pointer;
      user-select: none;
    }
    .drill-adset-header:hover { background: linear-gradient(120deg, #023e80 0%, var(--blue-dark) 100%); }
    .drill-adset-name { font-weight: 700; font-size: .87rem; flex: 1; min-width: 140px; }
    .drill-adset-toggle {
      font-size: .7rem; opacity: .75;
      transition: transform .2s; flex-shrink: 0;
    }
    .drill-adset-toggle.collapsed { transform: rotate(-90deg); }
    .drill-adset-body { overflow: hidden; transition: max-height .25s ease; max-height: 2000px; }
    .drill-adset-body.collapsed { max-height: 0; }
    .drill-metric { font-size: .77rem; white-space: nowrap; opacity: .9; }
    .drill-metric strong { opacity: 1; font-weight: 700; }

    .drill-table { width: 100%; border-collapse: collapse; font-size: .85rem; }
    .drill-ad-row td {
      padding: 9px 16px;
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
    }
    .drill-ad-row:last-child td { border-bottom: none; }
    .drill-ad-row:nth-child(even) { background: #f5f8ff; }
    .drill-ad-row:hover { background: var(--blue-light); }
    .drill-ad-name-cell {
      max-width: 340px;
      white-space: normal;
      overflow-wrap: break-word;
      word-break: break-word;
      color: var(--text);
      font-weight: 500;
    }
    .drill-no-data { padding: 36px; text-align: center; color: var(--muted); font-size: .9rem; }

    .drill-thead th {
      background: #1a6bd4;
      color: #fff;
      padding: 8px 14px;
      text-align: center;
      font-size: .72rem;
      font-weight: 700;
      cursor: pointer;
      user-select: none;
      white-space: nowrap;
      text-transform: uppercase;
      letter-spacing: .3px;
    }
    .drill-thead th:first-child { text-align: left; }
    .drill-thead th:hover { background: #1560c0; }
    .drill-thead th.sort-active { background: var(--blue-deep); }
    .drill-sort-icon { margin-left: 4px; opacity: .45; font-size: .75em; }
    .drill-thead th.sort-active .drill-sort-icon { opacity: 1; }
  </style>
</head>
<body>

<!-- Demo Banner -->
<div class="demo-banner" id="demo-banner">
  <span class="demo-banner-badge">DEMO</span>
  <span class="demo-banner-text">Dados 100% fictícios · Interface funcional para demonstração · Sem conexão com banco de dados</span>
  <button class="demo-banner-close" onclick="document.getElementById('demo-banner').style.display='none'" title="Fechar">✕</button>
</div>

<header>
  <div class="header-icon">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/>
    </svg>
  </div>
  <div class="header-text">
    <h1>Ad Analytics</h1>
    <span class="header-sub">Desempenho por Anúncio</span>
  </div>
  <div class="header-badge">Demo</div>
</header>

<main>
  <div class="card">
    <div class="card-title">Configurar Relatório</div>
    <div class="filters">
      <div class="filter-group">
        <label>Fonte de Mídia</label>
        <select id="platform">
          <optgroup label="Meta Ads">
            <option value="META_CAD">Meta — CAD</option>
            <option value="META_CONV">Meta — Conv</option>
            <option value="META_WHATSAPP">Meta — WhatsApp</option>
            <option value="META_REDE_SOCIAL">Meta — Rede Social</option>
          </optgroup>
          <optgroup label="Google Ads">
            <option value="GOOGLE_PESQUISA">Google — Pesquisa</option>
            <option value="GOOGLE_YT">Google — YouTube</option>
            <option value="GOOGLE_PMAX">Google — Performance Max</option>
          </optgroup>
          <optgroup label="Outras Plataformas">
            <option value="TIKTOK">TikTok Ads</option>
            <option value="TABOOLA">Taboola</option>
            <option value="BING_PESQUISA">Bing — Pesquisa</option>
            <option value="BING_DISPLAY">Bing — Display</option>
            <option value="X">X (Twitter) Ads</option>
          </optgroup>
        </select>
      </div>

      <div class="filter-group">
        <label>Data Início</label>
        <input type="date" id="date-start" />
      </div>

      <div class="filter-group">
        <label>Data Fim</label>
        <input type="date" id="date-end" />
      </div>

      <div class="filter-group" style="justify-content: flex-end;">
        <label>&nbsp;</label>
        <div class="actions">
          <button class="btn btn-primary" id="btn-report" onclick="gerarRelatorio()">Gerar Relatório</button>
          <button class="btn btn-success" id="btn-export" onclick="alert('Exportação desabilitada no modo demo.')" style="display:none">Download Excel</button>
        </div>
      </div>
    </div>

    <div class="presets" id="presets">
      <button class="preset-btn" data-preset="today">Hoje</button>
      <button class="preset-btn" data-preset="this-week">Esta semana</button>
      <button class="preset-btn" data-preset="this-month">Mês atual</button>
      <button class="preset-btn" data-preset="last-month">Mês anterior</button>
      <button class="preset-btn" data-preset="last-quarter">Último trimestre</button>
      <button class="preset-btn" data-preset="last-6months">Últimos 6 meses</button>
      <button class="preset-btn" data-preset="last-year">Último ano</button>
    </div>

    <div style="margin-top: 12px;">
      <span id="status"></span>
    </div>
  </div>

  <div class="card" id="results-section">
    <div style="display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:12px; margin-bottom:14px;">
      <div class="summary-bar" id="summary-bar" style="margin-bottom:0;"></div>
      <div class="view-toggle" id="view-toggle" style="display:none;">
        <button class="toggle-btn active" id="btn-view-ad" onclick="setView('ad')">Por Anúncio</button>
        <button class="toggle-btn" id="btn-view-campaign" onclick="setView('campaign')">Por Campanha</button>
      </div>
    </div>
    <div style="margin-bottom:12px;">
      <div class="search-box">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="search-input" placeholder="Filtrar por nome…" oninput="onSearchInput(this.value)" autocomplete="off" />
        <button class="search-clear" id="search-clear" onclick="clearSearch()" title="Limpar">×</button>
      </div>
    </div>

    <div class="table-wrapper">
      <table id="report-table">
        <thead>
          <tr>
            <th id="col-name-header" data-col="0">Nome do Anúncio<span class="sort-icon">↕</span></th>
            <th data-col="1">Leads<span class="sort-icon">↕</span></th>
            <th data-col="2">CPL<span class="sort-icon">↕</span></th>
            <th data-col="3">Total Gasto<span class="sort-icon">↕</span></th>
            <th data-col="4">Agendamentos<span class="sort-icon">↕</span></th>
            <th data-col="5">CPA<span class="sort-icon">↕</span></th>
            <th data-col="6">% Agendamentos<span class="sort-icon">↕</span></th>
          </tr>
        </thead>
        <tbody id="report-body"></tbody>
        <tfoot id="report-foot"></tfoot>
      </table>
    </div>
  </div>
</main>

<!-- Modal de drill-down por campanha -->
<div class="modal-backdrop" id="drill-modal" onclick="closeDrillOnBackdrop(event)">
  <div class="modal-box drill-modal-box">
    <button class="modal-close" onclick="closeDrill()" title="Fechar">×</button>
    <div class="modal-title" id="drill-title"></div>
    <div id="drill-content"></div>
  </div>
</div>

<script>
  // ── Date helpers ──────────────────────────────────────────────
  function toISO(d) { return d.toISOString().slice(0, 10); }

  function applyPreset(preset) {
    const today = new Date();
    today.setHours(0, 0, 0, 0);
    let start, end = new Date(today);
    if (preset === 'today') {
      start = new Date(today);
    } else if (preset === 'this-week') {
      const day = today.getDay() || 7;
      start = new Date(today);
      start.setDate(today.getDate() - (day - 1));
    } else if (preset === 'this-month') {
      start = new Date(today.getFullYear(), today.getMonth(), 1);
    } else if (preset === 'last-month') {
      start = new Date(today.getFullYear(), today.getMonth() - 1, 1);
      end   = new Date(today.getFullYear(), today.getMonth(), 0);
    } else if (preset === 'last-quarter') {
      start = new Date(today); start.setMonth(today.getMonth() - 3);
    } else if (preset === 'last-6months') {
      start = new Date(today); start.setMonth(today.getMonth() - 6);
    } else if (preset === 'last-year') {
      start = new Date(today); start.setFullYear(today.getFullYear() - 1);
    } else return;
    document.getElementById('date-start').value = toISO(start);
    document.getElementById('date-end').value   = toISO(end);
    document.querySelectorAll('.preset-btn').forEach(b => {
      b.classList.toggle('active', b.dataset.preset === preset);
    });
  }

  ['date-start', 'date-end'].forEach(id => {
    document.getElementById(id).addEventListener('change', () => {
      document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
    });
  });

  document.querySelectorAll('.preset-btn').forEach(btn => {
    btn.addEventListener('click', () => applyPreset(btn.dataset.preset));
  });

  applyPreset('this-month');

  // ── Fake data generator ───────────────────────────────────────
  const PLATFORM_LABELS = {
    META_CAD:         'Meta — CAD',
    META_CONV:        'Meta — Conv',
    META_WHATSAPP:    'Meta — WhatsApp',
    META_REDE_SOCIAL: 'Meta — Rede Social',
    GOOGLE_PESQUISA:  'Google — Pesquisa',
    GOOGLE_YT:        'Google — YouTube',
    GOOGLE_PMAX:      'Google — Performance Max',
    TIKTOK:           'TikTok Ads',
    TABOOLA:          'Taboola',
    BING_PESQUISA:    'Bing — Pesquisa',
    BING_DISPLAY:     'Bing — Display',
    X:                'X (Twitter) Ads',
  };

  // Seed-based pseudo-random for reproducible fake data
  function seededRand(seed) {
    let s = seed;
    return function() {
      s = (s * 9301 + 49297) % 233280;
      return s / 233280;
    };
  }

  const CAMPAIGN_TEMPLATES = {
    META_CAD: [
      { c: 'Leads Produto A — Público Frio', adsets: ['Lookalike 1% — Compradores', 'Interesses — Serviço Premium'] },
      { c: 'Remarketing — Visitantes 30d', adsets: ['Visitantes Página Principal', 'Engajados Redes Sociais'] },
      { c: 'Prospecção — Região Sul', adsets: ['Público Amplo 35-55', 'Lookalike 2% — Leads Qualificados'] },
    ],
    META_CONV: [
      { c: 'Conversão — Captação Direta', adsets: ['Público Semelhante 1%', 'Interesses Combinados'] },
      { c: 'Retargeting — Carrinho Abandonado', adsets: ['Visitantes Página de Oferta', 'Engajados 7d'] },
    ],
    META_WHATSAPP: [
      { c: 'WhatsApp — Atendimento Direto', adsets: ['Público Frio — SP/RJ', 'Lookalike 1% — Conversores'] },
      { c: 'WhatsApp — Prospecção Nacional', adsets: ['Interesse em Serviços', 'Público Amplo 25-60'] },
    ],
    META_REDE_SOCIAL: [
      { c: 'Engajamento — Conteúdo Orgânico', adsets: ['Fãs da Página + Similares', 'Público Amplo'] },
    ],
    GOOGLE_PESQUISA: [
      { c: 'Pesquisa — Marca', adsets: ['Termos de Marca', 'Marca + Produto'] },
      { c: 'Pesquisa — Concorrentes', adsets: ['Concorrentes Diretos', 'Termos Alternativos'] },
      { c: 'Pesquisa — Produto Genérico', adsets: ['Intenção Alta', 'Intenção Média'] },
    ],
    GOOGLE_YT: [
      { c: 'YouTube — Awareness', adsets: ['In-Stream — Audiência Affinity', 'Bumper 6s — Remarketing'] },
      { c: 'YouTube — Consideração', adsets: ['TrueView — Custom Intent', 'Discovery — Interesse'] },
    ],
    GOOGLE_PMAX: [
      { c: 'Performance Max — Todos os Canais', adsets: ['Asset Group Principal', 'Asset Group Secundário'] },
    ],
    TIKTOK: [
      { c: 'TikTok — Geração de Leads', adsets: ['Público Frio 18-35', 'Interesses — Estilo de Vida'] },
      { c: 'TikTok — Spark Ads', adsets: ['Conteúdo Orgânico Impulsionado', 'Parceria Criadores'] },
    ],
    TABOOLA: [
      { c: 'Taboola — Native Leads', adsets: ['Portais de Notícias', 'Sites de Conteúdo'] },
    ],
    BING_PESQUISA: [
      { c: 'Bing — Marca', adsets: ['Termos de Marca'] },
      { c: 'Bing — Produto Genérico', adsets: ['Alta Intenção'] },
    ],
    BING_DISPLAY: [
      { c: 'Bing Display — Remarketing', adsets: ['Visitantes Recentes'] },
    ],
    X: [
      { c: 'X Ads — Prospecção', adsets: ['Seguidores de Concorrentes', 'Palavras-chave de Interesse'] },
    ],
  };

  const AD_NAMES = [
    'Vídeo 30s — Versão A',
    'Vídeo 30s — Versão B',
    'Carrossel — Benefícios',
    'Carrossel — Depoimentos',
    'Imagem Estática — Oferta Principal',
    'Imagem Estática — Benefício Único',
    'Story — Depoimento Cliente',
    'Story — Chamada Direta',
    'Vídeo 15s — Destaque de Produto',
    'Vídeo 60s — Explicativo',
    'Banner — Imagem Simples',
    'Animação — Loop 10s',
  ];

  function makeRow(adName, campaignName, adsetName, leads, spend, appointments) {
    const cpl  = leads > 0 ? Math.round(spend / leads * 100) / 100 : null;
    const cpa  = appointments > 0 ? Math.round(spend / appointments * 100) / 100 : null;
    const rate = leads > 0 ? Math.round(appointments / leads * 1000) / 10 : null;
    return {
      ad_name: adName,
      campaign_name: campaignName,
      adset_name: adsetName,
      leads, spend: Math.round(spend * 100) / 100,
      appointments, cpl, cpa, appointment_rate: rate,
      is_total: false,
    };
  }

  function generateFakeRows(platform) {
    const rand = seededRand(platform.split('').reduce((a, c) => a + c.charCodeAt(0), 0));
    const templates = CAMPAIGN_TEMPLATES[platform] || CAMPAIGN_TEMPLATES['META_CAD'];
    const rows = [];

    // Platform-specific spend/leads multiplier
    const multipliers = {
      META_CAD: { cpl: 18, conv: 0.22 },
      META_CONV: { cpl: 22, conv: 0.26 },
      META_WHATSAPP: { cpl: 14, conv: 0.31 },
      META_REDE_SOCIAL: { cpl: 8, conv: 0.12 },
      GOOGLE_PESQUISA: { cpl: 38, conv: 0.35 },
      GOOGLE_YT: { cpl: 28, conv: 0.18 },
      GOOGLE_PMAX: { cpl: 32, conv: 0.24 },
      TIKTOK: { cpl: 16, conv: 0.19 },
      TABOOLA: { cpl: 45, conv: 0.14 },
      BING_PESQUISA: { cpl: 35, conv: 0.32 },
      BING_DISPLAY: { cpl: 55, conv: 0.11 },
      X: { cpl: 48, conv: 0.13 },
    };
    const m = multipliers[platform] || { cpl: 25, conv: 0.20 };

    for (const tmpl of templates) {
      for (const adset of tmpl.adsets) {
        // 3-5 ads per adset
        const numAds = 3 + Math.floor(rand() * 3);
        for (let i = 0; i < numAds; i++) {
          const adName = AD_NAMES[Math.floor(rand() * AD_NAMES.length)];
          const leads = 20 + Math.floor(rand() * 180);
          const baseCpl = m.cpl * (0.7 + rand() * 0.8);
          const spend = leads * baseCpl;
          const convRate = m.conv * (0.5 + rand() * 1.0);
          const appointments = Math.floor(leads * convRate);
          rows.push(makeRow(adName, tmpl.c, adset, leads, spend, appointments));
        }
      }
    }

    // Sort by leads desc
    rows.sort((a, b) => b.leads - a.leads);

    // Add total row
    const totalLeads = rows.reduce((s, r) => s + r.leads, 0);
    const totalSpend = rows.reduce((s, r) => s + r.spend, 0);
    const totalAppts = rows.reduce((s, r) => s + r.appointments, 0);
    rows.push({
      ad_name: 'TOTAL GERAL',
      leads: totalLeads,
      spend: Math.round(totalSpend * 100) / 100,
      appointments: totalAppts,
      cpl: totalLeads > 0 ? Math.round(totalSpend / totalLeads * 100) / 100 : null,
      cpa: totalAppts > 0 ? Math.round(totalSpend / totalAppts * 100) / 100 : null,
      appointment_rate: totalLeads > 0 ? Math.round(totalAppts / totalLeads * 1000) / 10 : null,
      is_total: true,
    });

    return rows;
  }

  // ── State ─────────────────────────────────────────────────────
  let lastRequest = null;
  let allAdRows = [];
  let allCampaignRows = [];
  let currentPlatform = '';
  let currentView = 'ad';
  let searchTerm = '';
  let sortState = { col: null, dir: null };
  const COL_KEYS = ['ad_name', 'leads', 'cpl', 'spend', 'appointments', 'cpa', 'appointment_rate'];

  function onSearchInput(value) {
    searchTerm = value.trim().toLowerCase();
    document.getElementById('search-clear').classList.toggle('visible', searchTerm.length > 0);
    renderView(currentView);
  }

  function clearSearch() {
    searchTerm = '';
    document.getElementById('search-input').value = '';
    document.getElementById('search-clear').classList.remove('visible');
    renderView(currentView);
  }

  function applySortToRows(rows) {
    if (sortState.col === null) return rows;
    const key = COL_KEYS[sortState.col];
    const dir = sortState.dir === 'desc' ? -1 : 1;
    return [...rows].sort((a, b) => {
      const av = a[key], bv = b[key];
      if (av === null && bv === null) return 0;
      if (av === null) return 1;
      if (bv === null) return -1;
      if (typeof av === 'string') return dir * av.localeCompare(bv, 'pt-BR', { sensitivity: 'base' });
      return dir * (av - bv);
    });
  }

  function updateSortIcons() {
    document.querySelectorAll('#report-table thead th[data-col]').forEach(th => {
      const colIdx = parseInt(th.dataset.col, 10);
      const icon = th.querySelector('.sort-icon');
      th.classList.toggle('sort-active', sortState.col === colIdx);
      if (!icon) return;
      if (sortState.col === colIdx) {
        icon.textContent = sortState.dir === 'desc' ? '↓' : '↑';
      } else {
        icon.textContent = '↕';
      }
    });
  }

  function setStatus(msg, isError = false) {
    const el = document.getElementById('status');
    el.textContent = msg;
    el.className = isError ? 'error' : '';
  }

  function fmt(v, type) {
    if (v === null || v === undefined) return '<span class="na">N/A</span>';
    if (type === 'currency') return 'R$ ' + Number(v).toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    if (type === 'pct') return Number(v).toFixed(1) + '%';
    return v;
  }

  function gerarRelatorio() {
    const platform = document.getElementById('platform').value;
    const dateStart = document.getElementById('date-start').value;
    const dateEnd = document.getElementById('date-end').value;

    if (!dateStart || !dateEnd) { setStatus('Selecione o período.', true); return; }
    if (dateStart > dateEnd) { setStatus('Data início deve ser anterior à data fim.', true); return; }

    lastRequest = { platform, date_start: dateStart, date_end: dateEnd };
    sortState = { col: null, dir: null };
    searchTerm = '';
    document.getElementById('search-input').value = '';
    document.getElementById('search-clear').classList.remove('visible');
    document.getElementById('results-section').style.display = 'none';
    document.getElementById('btn-export').style.display = 'none';
    document.getElementById('view-toggle').style.display = 'none';
    setStatus('Carregando dados demo…');

    // Simulate brief loading
    setTimeout(() => {
      allAdRows = generateFakeRows(platform);
      allCampaignRows = [];
      currentPlatform = platform;
      currentView = 'ad';
      document.getElementById('btn-view-ad').classList.add('active');
      document.getElementById('btn-view-campaign').classList.remove('active');
      document.getElementById('view-toggle').style.display = 'flex';
      renderView('ad');
      setStatus('');
      document.getElementById('btn-export').style.display = 'inline-block';
    }, 600);
  }

  function setView(view) {
    currentView = view;
    document.getElementById('btn-view-ad').classList.toggle('active', view === 'ad');
    document.getElementById('btn-view-campaign').classList.toggle('active', view === 'campaign');
    renderView(view);
  }

  function renderView(view) {
    if (view === 'campaign') {
      const groups = {};
      for (const r of allAdRows.filter(r => !r.is_total)) {
        const key = r.campaign_name || 'Sem campanha';
        if (!groups[key]) groups[key] = { name: key, leads: 0, appointments: 0, spend: 0 };
        groups[key].leads        += r.leads;
        groups[key].appointments += r.appointments;
        groups[key].spend        += r.spend;
      }
      const campRows = Object.values(groups).map(g => {
        const s = Math.round(g.spend * 100) / 100;
        return {
          ad_name: g.name,
          leads: g.leads,
          appointments: g.appointments,
          spend: s,
          cpl:              g.leads > 0 ? Math.round(s / g.leads * 100) / 100 : null,
          cpa:              g.appointments > 0 ? Math.round(s / g.appointments * 100) / 100 : null,
          appointment_rate: g.leads > 0 ? Math.round(g.appointments / g.leads * 1000) / 10 : null,
          campaign_name: g.name,
        };
      });
      campRows.sort((a, b) => b.spend - a.spend);
      const total = allAdRows.find(r => r.is_total);
      renderTable([...campRows, total], currentPlatform, 'campaign');
    } else {
      renderTable(allAdRows, currentPlatform, 'ad');
    }
  }

  function renderTable(rows, platform, view) {
    document.getElementById('col-name-header').textContent =
      view === 'campaign' ? 'Nome da Campanha' : 'Nome do Anúncio';

    const tbody = document.getElementById('report-body');
    const tfoot = document.getElementById('report-foot');
    tbody.innerHTML = '';
    tfoot.innerHTML = '';

    const allDataRows = rows.filter(r => !r.is_total);
    const filteredRows = searchTerm
      ? allDataRows.filter(r => (r.ad_name || '').toLowerCase().includes(searchTerm))
      : allDataRows;
    const dataRows = applySortToRows(filteredRows);
    const totalRow = rows.find(r => r.is_total);

    for (const r of dataRows) {
      const tr = document.createElement('tr');
      let nameCell;
      if (view === 'campaign') {
        nameCell = `<a class="ad-link" href="#" onclick="openCampaignDrill(event, '${escHtml(r.ad_name)}')">${escHtml(r.ad_name)}</a>`;
      } else {
        nameCell = escHtml(r.ad_name);
      }
      tr.innerHTML = `
        <td>${nameCell}</td>
        <td>${r.leads}</td>
        <td>${fmt(r.cpl, 'currency')}</td>
        <td>${fmt(r.spend, 'currency')}</td>
        <td>${r.appointments}</td>
        <td>${fmt(r.cpa, 'currency')}</td>
        <td>${fmt(r.appointment_rate, 'pct')}</td>
      `;
      tbody.appendChild(tr);
    }

    if (totalRow) {
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td>TOTAL GERAL</td>
        <td>${totalRow.leads}</td>
        <td>${fmt(totalRow.cpl, 'currency')}</td>
        <td>${fmt(totalRow.spend, 'currency')}</td>
        <td>${totalRow.appointments}</td>
        <td>${fmt(totalRow.cpa, 'currency')}</td>
        <td>${fmt(totalRow.appointment_rate, 'pct')}</td>
      `;
      tfoot.appendChild(tr);
    }

    const label = view === 'campaign' ? 'campanhas' : 'anúncios';
    const bar = document.getElementById('summary-bar');
    if (totalRow) {
      const countLabel = (searchTerm && dataRows.length !== allDataRows.length)
        ? `<strong>${dataRows.length}</strong> de ${allDataRows.length} ${label}`
        : `<strong>${dataRows.length}</strong> ${label}`;
      bar.innerHTML = `
        <span class="summary-item">${countLabel}</span>
        <span class="summary-item">Fonte: <strong>${escHtml(PLATFORM_LABELS[platform] || platform)}</strong></span>
        <span class="summary-item">Total Gasto: <strong>${fmt(totalRow.spend, 'currency')}</strong></span>
        <span class="summary-item">Total Leads: <strong>${totalRow.leads}</strong></span>
        <span class="summary-item">Total Agendamentos: <strong>${totalRow.appointments}</strong></span>
      `;
    }

    document.getElementById('results-section').style.display = 'block';
    updateSortIcons();
  }

  // ── Drill-down (client-side only) ─────────────────────────────
  let _currentDrillAdsets = [];
  let drillSortState = { col: null, dir: null };
  const DRILL_COL_KEYS = ['ad_name', 'leads', 'cpl', 'spend', 'appointments', 'cpa', 'appointment_rate'];

  function openCampaignDrill(event, campaignName) {
    event.preventDefault();
    drillSortState = { col: null, dir: null };
    document.getElementById('drill-title').textContent = campaignName;
    document.getElementById('drill-modal').classList.add('open');

    const campAds = allAdRows.filter(r => !r.is_total && r.campaign_name === campaignName);
    if (!campAds.length) {
      document.getElementById('drill-content').innerHTML =
        '<div class="drill-no-data">Nenhum anúncio encontrado para esta campanha.</div>';
      return;
    }

    const adsetMap = {};
    for (const ad of campAds) {
      const key = ad.adset_name || 'Sem conjunto';
      if (!adsetMap[key]) adsetMap[key] = [];
      adsetMap[key].push(ad);
    }

    const adsets = Object.entries(adsetMap).map(([name, ads]) => {
      const spend = Math.round(ads.reduce((s, r) => s + r.spend, 0) * 100) / 100;
      const leads = ads.reduce((s, r) => s + r.leads, 0);
      const appts = ads.reduce((s, r) => s + r.appointments, 0);
      return {
        name, spend, leads, appointments: appts,
        cpl:              leads > 0 ? Math.round(spend / leads * 100) / 100 : null,
        cpa:              appts > 0 ? Math.round(spend / appts * 100) / 100 : null,
        appointment_rate: leads > 0 ? Math.round(appts / leads * 1000) / 10 : null,
        ads: ads.map(ad => ({
          ad_name:          ad.ad_name,
          spend:            ad.spend,
          leads:            ad.leads,
          appointments:     ad.appointments,
          cpl:              ad.cpl,
          cpa:              ad.cpa,
          appointment_rate: ad.appointment_rate,
        })),
      };
    });
    adsets.sort((a, b) => b.spend - a.spend);
    _renderCampaignDrill(adsets);
  }

  function _drillSort(colIdx) {
    if (drillSortState.col === colIdx) {
      if (drillSortState.dir === 'desc')     drillSortState.dir = 'asc';
      else if (drillSortState.dir === 'asc') { drillSortState.col = null; drillSortState.dir = null; }
    } else {
      drillSortState.col = colIdx;
      drillSortState.dir = 'desc';
    }
    _renderCampaignDrill(_currentDrillAdsets);
  }

  function _applyDrillSort(ads) {
    const key = drillSortState.col !== null ? DRILL_COL_KEYS[drillSortState.col] : 'spend';
    const dir = (drillSortState.col !== null && drillSortState.dir === 'asc') ? 1 : -1;
    return [...ads].sort((a, b) => {
      const av = a[key], bv = b[key];
      if (av === null && bv === null) return 0;
      if (av === null) return 1;
      if (bv === null) return -1;
      if (typeof av === 'string') return dir * av.localeCompare(bv, 'pt-BR', { sensitivity: 'base' });
      return dir * (av - bv);
    });
  }

  function _drillIcon(colIdx) {
    if (drillSortState.col !== colIdx) return '↕';
    return drillSortState.dir === 'desc' ? '↓' : '↑';
  }

  function _renderCampaignDrill(adsets) {
    _currentDrillAdsets = adsets || [];
    if (!_currentDrillAdsets.length) {
      document.getElementById('drill-content').innerHTML =
        '<div class="drill-no-data">Esta campanha não teve veiculação no período selecionado.</div>';
      return;
    }

    const headers = ['Anúncio', 'Leads', 'CPL', 'Total Gasto', 'Agendamentos', 'CPA', '% Agend'];
    const theadHtml = `
      <thead class="drill-thead"><tr>
        ${headers.map((h, i) => `
          <th class="${drillSortState.col === i ? 'sort-active' : ''}" onclick="_drillSort(${i})">
            ${h}<span class="drill-sort-icon">${_drillIcon(i)}</span>
          </th>`).join('')}
      </tr></thead>
    `;

    let html = '';
    for (let i = 0; i < _currentDrillAdsets.length; i++) {
      const adset = _currentDrillAdsets[i];
      html += `
        <div class="drill-adset">
          <div class="drill-adset-header" onclick="_toggleDrillAdset(${i})">
            <span class="drill-adset-toggle" id="drill-toggle-${i}">▼</span>
            <span class="drill-adset-name">${escHtml(adset.name)}</span>
            <span class="drill-metric">Leads: <strong>${adset.leads}</strong></span>
            <span class="drill-metric">Gasto: <strong>${fmt(adset.spend, 'currency')}</strong></span>
            <span class="drill-metric">CPL: <strong>${fmt(adset.cpl, 'currency')}</strong></span>
            <span class="drill-metric">Agend: <strong>${adset.appointments}</strong></span>
            <span class="drill-metric">CPA: <strong>${fmt(adset.cpa, 'currency')}</strong></span>
          </div>
          <div class="drill-adset-body" id="drill-body-${i}">
            <table class="drill-table">${theadHtml}<tbody>
      `;
      for (const ad of _applyDrillSort(adset.ads)) {
        html += `
          <tr class="drill-ad-row">
            <td class="drill-ad-name-cell">${escHtml(ad.ad_name)}</td>
            <td style="text-align:center">${ad.leads}</td>
            <td style="text-align:center">${fmt(ad.cpl, 'currency')}</td>
            <td style="text-align:center">${fmt(ad.spend, 'currency')}</td>
            <td style="text-align:center">${ad.appointments}</td>
            <td style="text-align:center">${fmt(ad.cpa, 'currency')}</td>
            <td style="text-align:center">${fmt(ad.appointment_rate, 'pct')}</td>
          </tr>
        `;
      }
      html += `</tbody></table></div></div>`;
    }

    document.getElementById('drill-content').innerHTML = html;
  }

  function _toggleDrillAdset(i) {
    const body   = document.getElementById(`drill-body-${i}`);
    const toggle = document.getElementById(`drill-toggle-${i}`);
    if (!body) return;
    body.classList.toggle('collapsed');
    toggle.classList.toggle('collapsed');
  }

  function closeDrill() {
    document.getElementById('drill-modal').classList.remove('open');
    document.getElementById('drill-content').innerHTML = '';
  }

  function closeDrillOnBackdrop(event) {
    if (event.target === document.getElementById('drill-modal')) closeDrill();
  }

  function escHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;')
      .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeDrill();
    if (e.key === 'Enter' && !document.getElementById('drill-modal').classList.contains('open')) gerarRelatorio();
  });

  document.querySelectorAll('#report-table thead th[data-col]').forEach(th => {
    th.addEventListener('click', () => {
      const colIdx = parseInt(th.dataset.col, 10);
      if (sortState.col === colIdx) {
        if (sortState.dir === 'desc')     sortState.dir = 'asc';
        else if (sortState.dir === 'asc') { sortState.col = null; sortState.dir = null; }
      } else {
        sortState.col = colIdx;
        sortState.dir = 'desc';
      }
      renderView(currentView);
    });
  });

  // Auto-load demo on page open
  window.addEventListener('DOMContentLoaded', () => {
    setTimeout(() => gerarRelatorio(), 300);
  });
</script>
</body>
</html>
